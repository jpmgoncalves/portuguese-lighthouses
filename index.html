  // Calculate bounds to fit all lighthouses
  const bounds = new mapboxgl.LngLatBounds();
  lighthouses.forEach(lh => bounds.extend([lh.lng, lh.lat]));

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: bounds.getCenter(),
    zoom: 6,
    pitch: 0,
    attributionControl: true,
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');

  // Fit map to show all lighthouses on load
  map.on('load', () => {
    map.fitBounds(bounds, { padding: 50, maxZoom: 8 });
  });

  map.on('load', () => {
    // Build circle features from turf
    const circleFeatures = lighthouses.map(lh => {
      const circle = turf.circle([lh.lng, lh.lat], lh.reachKm, {
        steps: 80,
        units: 'kilometers'
      });
      circle.properties = { name: lh.name };
      return circle;
    });

    const circleCollection = turf.featureCollection(circleFeatures);

    // Add circle source and layers
    map.addSource('light-reach', {
      type: 'geojson',
      data: circleCollection
    });

    map.addLayer({
      id: 'light-reach-fill',
      type: 'fill',
      source: 'light-reach',
      paint: {
        'fill-color': '#f5c842',
        'fill-opacity': 0.06
      }
    });

    map.addLayer({
      id: 'light-reach-border',
      type: 'line',
      source: 'light-reach',
      paint: {
        'line-color': '#f5c842',
        'line-opacity': 0.25,
        'line-width': 1
      }
    });

    // Add lighthouse points as a GeoJSON source (canvas-rendered, moves with map)
    const pointFeatures = lighthouses.map(lh => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lh.lng, lh.lat] },
      properties: {
        name: lh.name,
        location: lh.location,
        type: lh.type,
        established: lh.established,
        height: lh.height,
        altitude: lh.altitude,
        reachKm: lh.reachKm,
        reachMi: lh.reachMi,
        characteristics: lh.characteristics
      }
    }));

    map.addSource('lighthouse-points', {
      type: 'geojson',
      data: turf.featureCollection(pointFeatures)
    });

    // Outer glow
    map.addLayer({
      id: 'lighthouse-glow',
      type: 'circle',
      source: 'lighthouse-points',
      paint: {
        'circle-radius': 10,
        'circle-color': '#f5c842',
        'circle-opacity': 0.15,
        'circle-blur': 1
      }
    });

    // Main dot
    map.addLayer({
      id: 'lighthouse-dot',
      type: 'circle',
      source: 'lighthouse-points',
      paint: {
        'circle-radius': 5,
        'circle-color': '#f5c842',
        'circle-opacity': 1,
        'circle-stroke-width': 1.5,
        'circle-stroke-color': '#ffffff'
      }
    });

    // --- Rotating beam animation ---
    let beamAnimationId = null;
    let activeBeamLighthouse = null;
    let activePopup = null;

    const emptyGeoJSON = turf.featureCollection([]);

    map.addSource('light-beam', {
      type: 'geojson',
      data: emptyGeoJSON
    });

    // Beam fill — bright gradient-like effect
    map.addLayer({
      id: 'light-beam-fill',
      type: 'fill',
      source: 'light-beam',
      paint: {
        'fill-color': '#f5c842',
        'fill-opacity': 0.18
      }
    });

    // Beam edge glow
    map.addLayer({
      id: 'light-beam-edge',
      type: 'line',
      source: 'light-beam',
      paint: {
        'line-color': '#f5c842',
        'line-opacity': 0.4,
        'line-width': 1.5,
        'line-blur': 2
      }
    });

    function startBeamAnimation(lh) {
      stopBeamAnimation();
      activeBeamLighthouse = lh;

      const beamWidth = 8; // degrees width of each beam
      const speed = 0.4;   // degrees per frame
      let angle = 0;

      function animate() {
        angle = (angle + speed) % 360;

        // Create two opposite beam sectors
        const sector1 = turf.sector(
          [lh.lng, lh.lat], lh.reachKm,
          angle - beamWidth / 2, angle + beamWidth / 2,
          { units: 'kilometers', steps: 40 }
        );
        const sector2 = turf.sector(
          [lh.lng, lh.lat], lh.reachKm,
          angle + 180 - beamWidth / 2, angle + 180 + beamWidth / 2,
          { units: 'kilometers', steps: 40 }
        );

        map.getSource('light-beam').setData(
          turf.featureCollection([sector1, sector2])
        );

        beamAnimationId = requestAnimationFrame(animate);
      }

      animate();
    }

    function stopBeamAnimation() {
      if (beamAnimationId) {
        cancelAnimationFrame(beamAnimationId);
        beamAnimationId = null;
      }
      activeBeamLighthouse = null;
      map.getSource('light-beam')?.setData(emptyGeoJSON);
    }

    // Popup on click + start beam
    map.on('click', 'lighthouse-dot', (e) => {
      const props = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();

      // Find the matching lighthouse data for reach
      const lh = lighthouses.find(l => l.name === props.name);

      // If clicking the same lighthouse, toggle off
      if (activeBeamLighthouse && activeBeamLighthouse.name === props.name) {
        stopBeamAnimation();
        if (activePopup) { activePopup.remove(); activePopup = null; }
        return;
      }

      // Close previous popup
      if (activePopup) { activePopup.remove(); }

      // Start beam animation
      if (lh) startBeamAnimation(lh);

      const popupHTML = `
        <div class="popup-name">${props.name}</div>
        <div class="popup-detail">
          <span class="popup-label">Location</span>
          <span class="popup-value">${props.location}</span>
        </div>
        <div class="popup-detail">
          <span class="popup-label">Established</span>
          <span class="popup-value">${props.established}</span>
        </div>
        <div class="popup-detail">
          <span class="popup-label">Tower Height</span>
          <span class="popup-value">${props.height}</span>
        </div>
        <div class="popup-detail">
          <span class="popup-label">Altitude</span>
          <span class="popup-value">${props.altitude}</span>
        </div>
        <div class="popup-detail">
          <span class="popup-label">Light Reach</span>
          <span class="popup-value">${props.reachKm} km (${props.reachMi})</span>
        </div>
        <div class="popup-detail">
          <span class="popup-label">Signal</span>
          <span class="popup-value">${props.characteristics}</span>
        </div>
        <div class="popup-type">${props.type}</div>
      `;

      activePopup = new mapboxgl.Popup({ offset: 12 })
        .setLngLat(coords)
        .setHTML(popupHTML)
        .on('close', () => {
          stopBeamAnimation();
          activePopup = null;
        })
        .addTo(map);
    });

    // Click on empty map area stops animation
    map.on('click', (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['lighthouse-dot'] });
      if (features.length === 0) {
        stopBeamAnimation();
        if (activePopup) { activePopup.remove(); activePopup = null; }
      }
    });

    // Pointer cursor on hover
    map.on('mouseenter', 'lighthouse-dot', () => {
      map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'lighthouse-dot', () => {
      map.getCanvas().style.cursor = '';
    });
  });
</script>

</body>
</html>
